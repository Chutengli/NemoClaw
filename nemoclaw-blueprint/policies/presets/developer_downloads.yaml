preset:
  name: developer_downloads
  description: "VS Code updates and GitHub release asset downloads"

network_policies:
  developer_downloads:
    name: developer_downloads
    endpoints:
      - host: update.code.visualstudio.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: vscode.download.prss.microsoft.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: release-assets.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/code }
